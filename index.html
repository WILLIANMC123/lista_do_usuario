<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Convidados</h1>

        <div class="botoes-container">
            <button id="btn-lista1" class="btn">Em Maiúsculas</button>
            <button id="btn-lista2" class="btn">Começam com "A"</button>
            <button id="btn-lista3" class="btn">Com 5 Letras</button>
        </div>

        <div id="secao-lista1" class="card">
            <h2>Todos os Convidados (Maiúsculas)</h2>
            <ul id="ul-lista1"></ul>
        </div>

        <div id="secao-lista2" class="card oculta">
            <h2>Convidados com a letra "A"</h2>
            <p>Total de nomes encontrados: <span id="contagem-a" class="destaque"></span></p>
            <ul id="ul-lista2"></ul>
        </div>

        <div id="secao-lista3" class="card oculta">
            <h2>Convidados com exatamente 5 letras</h2>
            <ul id="ul-lista3"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
