<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Convidados</h1>

        <div class="card">
            <h2>Lista em Maiúsculas</h2>
            <ul id="lista-maiusculas"></ul>
        </div>

        <div class="card">
            <h2>Estatísticas</h2>
            <p>Nomes que começam com a letra "A": <span id="contagem-a" class="destaque"></span></p>
        </div>

        <div class="card">
            <h2>Nomes com mais de 5 letras</h2>
            <ul id="lista-mais-cinco"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
