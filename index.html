<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Convidados</h1>

        <div class="botoes-container">
            <button id="btn-lista1" class="btn">Lista 1</button>
            <button id="btn-lista2" class="btn">Lista 2</button>
            <button id="btn-lista3" class="btn">Lista 3</button>
        </div>

        <div id="secao-lista1" class="card">
            <h2>Convidados - Grupo 1</h2>
            <ul id="ul-lista1"></ul>
        </div>

        <div id="secao-lista2" class="card oculta">
            <h2>Convidados - Grupo 2</h2>
            <ul id="ul-lista2"></ul>
        </div>

        <div id="secao-lista3" class="card oculta">
            <h2>Convidados - Grupo 3</h2>
            <ul id="ul-lista3"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
